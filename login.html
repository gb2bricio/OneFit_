<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login - OneFit</title>

    <link rel="stylesheet" href="./css/login.css">

    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css" />

</head>

<body>

    <main class="login-wrapper">

        <div class="login-card" data-aos="zoom-in">

            <div class="btn-home-wrap m-0">
                <a href="home.html" class="btn-home d-inline-flex align-items-center gap-2 w-auto">
                    <i class="fa-solid fa-house"></i>
                    <span></span>
                </a>
            </div>

            <img src="./img/logo_onefit.png" class="logo" alt="Logo OneFit">

            <h1>Login</h1>

            <form id="loginForm">

                <div class="input-group">

                    <input type="email" id="usuario" placeholder="Usuário" required>

                    <i class='bx bxs-user'></i>

                </div>

                <div class="input-group">

                    <input type="password" id="senha" placeholder="Senha" required>

                    <i class='bx bxs-lock-alt'></i>

                    <span class="toggle-password" id="togglePassword">
                        <i class='bx bx-show'></i>
                    </span>

                </div>

                <p id="erroSenha" class="erro"></p>

                <div class="remember-forgot">

                    <label>
                        <input type="checkbox" id="lembrar">
                        Lembrar senha
                    </label>

                    <a href="redefinirSenha.html">Esqueci a senha</a>

                </div>

                <button type="submit" id="btnLogin" class="btn-login" disabled>
                    LOGIN
                </button>

                <div class="register-link">

                    Treine com a gente!
                    <a href="matricula.html">Matricule-se</a>

                </div>

            </form>

        </div>

    </main>

    <script src="./js/login.js"></script>
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script>
        AOS.init({
            duration: 1000,
            once: false
        });
    </script>

</body>

</html>
